import = ["~/.config/alacritty/themes/catppuccin/catppuccin-macchiato.toml"]

[window]
opacity = 0.9

[font]
normal = { family = "FiraCode Nerd Font Mono", style = "Regular" }
bold = { family = "FiraCode Nerd Font Mono", style = "Bold" }
italic = { family = "Fisa Code", style = "Regular Italic" }
bold_italic = { family = "Fisa Code", style = "Italic" }
size = 14.0

[selection]
save_to_clipboard = true

[mouse]
hide_when_typing = true
